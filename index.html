<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track personal expenses, categorize spending, and visualize your budget distribution">
    <title>Expense & Budget Visualizer</title>
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header with Balance Display -->
        <header>
            <h1>Expense & Budget Visualizer</h1>
            <div class="balance-display">
                <span class="balance-label">Total Balance:</span>
                <span class="balance-amount" id="balanceAmount">$0.00</span>
            </div>
        </header>

        <!-- Warning Banner (hidden by default) -->
        <div class="warning-banner" id="warningBanner" style="display: none;">
            <span class="warning-message" id="warningMessage"></span>
            <button class="warning-close" id="warningClose" aria-label="Close warning">&times;</button>
        </div>

        <!-- Main Content -->
        <main>
            <!-- Input Form Section -->
            <section class="form-section">
                <h2>Add Transaction</h2>
                <form id="transactionForm" class="transaction-form">
                    <div class="form-group">
                        <label for="itemName">Item Name</label>
                        <input 
                            type="text" 
                            id="itemName" 
                            name="itemName" 
                            maxlength="100" 
                            placeholder="Enter item name"
                            aria-required="true"
                        >
                        <span class="error-message" id="itemNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input 
                            type="number" 
                            id="amount" 
                            name="amount" 
                            min="0.01" 
                            max="9999999.99" 
                            step="0.01" 
                            placeholder="0.00"
                            aria-required="true"
                        >
                        <span class="error-message" id="amountError"></span>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select 
                            id="category" 
                            name="category"
                            aria-required="true"
                        >
                            <option value="" disabled selected>Select a category</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Fun">Fun</option>
                        </select>
                        <span class="error-message" id="categoryError"></span>
                    </div>

                    <button type="submit" class="btn-primary">Add Transaction</button>
                </form>
            </section>

            <!-- Transaction List Section -->
            <section class="list-section">
                <h2>Transaction History</h2>
                <div class="transaction-list" id="transactionList" aria-live="polite">
                    <p class="empty-state" id="emptyState">No transactions recorded yet. Add your first transaction above!</p>
                </div>
            </section>

            <!-- Chart Section -->
            <section class="chart-section">
                <h2>Spending by Category</h2>
                <div class="chart-container">
                    <canvas id="spendingChart" aria-label="Pie chart showing spending distribution by category"></canvas>
                    <p class="chart-placeholder" id="chartPlaceholder" style="display: none;">No data to display</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; 2024 Expense & Budget Visualizer. All rights reserved.</p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
</body>
</html>
